  /* ---- 7) Perfect Season — roll a franchise-decade, draft five, chase 82-0 ---- */
  GAMES.perfect = (function(){
    const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
    const MING=41, CENTER=55, SCALE=6.0;   // locked calibration

    /* ----- player rating: real production + accolades + postseason (unchanged) ----- */
    const FIELDS=['ppg','rpg','apg','spg','bpg','ts','tp','ft'];
    let PCT=null;
    function buildPct(){ const base=DATA.filter(p=>p.g!=null&&p.g>=200); PCT={}; for(const f of FIELDS) PCT[f]=base.map(p=>p[f]).filter(v=>v!=null&&isFinite(v)).sort((a,b)=>a-b); }
    function pctl(f,v){ const a=PCT[f]; if(v==null||!a||!a.length) return null; let lo=0,hi=a.length; while(lo<hi){const m=(lo+hi)>>1; if(a[m]<=v)lo=m+1;else hi=m;} return lo/a.length*100; }
    function posClass(p){ const s=(p.posF||p.pos||'').toUpperCase(); if(s.includes('C')) return 'big'; if(s.includes('PF')) return 'big'; if(s.includes('SF')||s==='F') return 'wing'; if(s.includes('G')) return 'guard'; return 'wing'; }
    function rate(p){
      if(p.__r) return p.__r;
      const P=f=>{ const v=pctl(f,p[f]); return v==null?50:v; };
      const scoring=.60*P('ppg')+.40*P('ts');
      const playmaking=P('apg');
      const rebounding=P('rpg');
      const hasStocks=(p.spg!=null&&p.spg>0)||(p.bpg!=null&&p.bpg>0);
      const cls=posClass(p);
      const posFactor = cls==='big'?70:cls==='wing'?56:50;
      let defense = hasStocks ? (.42*P('spg')+.34*P('bpg')+.24*P('rpg')) : (.55*P('rpg')+.45*posFactor);
      defense = clamp(defense + Math.min((p.dpoy||0)*6,18), 0, 100);
      const spacing = (p.tp!=null&&p.tp>0) ? (.58*P('tp')+.42*P('ft')) : (.45*P('ts')+.55*P('ft'));
      const prestige = clamp((p.mvp||0)*10+(p.allnba||0)*3.2+(p.allstar||0)*1.4+(p.dpoy||0)*4+(p.roy||0)*2+(p.hof?6:0),0,100);
      const postseason = (p.po&&p.po.per!=null&&(p.po.g||0)>=20) ? clamp((p.po.per-9)/19*100,0,100) : 42;
      const usage = .58*P('ppg')+.42*P('apg');
      const raw = clamp(.25*scoring+.14*playmaking+.10*rebounding+.15*defense+.09*spacing+.15*prestige+.12*postseason,0,100);
      const ovr = clamp(Math.round(38+raw*0.72),25,99);
      p.__r={scoring,playmaking,rebounding,defense,spacing,prestige,postseason,usage,raw,ovr,cls};
      return p.__r;
    }
    function formula(line){
      if(line.length<5) return null;
      const R=line.map(rate);
      const A=k=>R.reduce((s,r)=>s+r[k],0)/R.length;
      const sum=k=>R.reduce((s,r)=>s+r[k],0);
      const starPower=A('raw');
      const shooters=R.filter(r=>r.spacing>=62).length;
      const spacingAdj = shooters>=4?6:shooters===3?2:shooters<=1?-9:-3;
      const playmakerBonus=clamp(Math.max.apply(null,R.map(r=>r.playmaking))-78,0,22)*.28;
      const usageGlut=Math.max(0,sum('usage')-372)*.16;
      const offense=clamp(A('scoring')+spacingAdj+playmakerBonus-usageGlut,0,100);
      const anchor=R.some(r=>r.cls==='big'&&r.defense>=78);
      const perim=R.filter(r=>(r.cls==='guard'||r.cls==='wing')&&r.defense>=66).length;
      const holes=R.filter(r=>r.defense<34).length;
      const defense=clamp(A('defense')+(anchor?5:0)+(perim>=2?4:0)-holes*4,0,100);
      const rebounding=A('rebounding');
      const spaceTeam=clamp(A('spacing')+spacingAdj,0,100);
      const postAvg=A('postseason');
      const guards=R.filter(r=>r.cls==='guard').length;
      const hasBig=R.some(r=>r.cls==='big'); const hasWing=R.some(r=>r.cls==='wing');
      let fit=100; if(!hasBig) fit-=14; if(guards>=4) fit-=8; if(shooters<3) fit-=7; if(usageGlut>0) fit-=6; if(hasBig&&hasWing&&guards>=1) fit+=4; fit=clamp(fit,0,100);
      const power=clamp(.30*offense+.26*defense+.12*rebounding+.14*fit+.12*starPower+.06*postAvg,0,100);
      return {R,power,offense,defense,rebounding,spaceTeam,fit,starPower,postAvg,shooters,anchor,guards,hasBig,usageGlut};
    }
    /* ----- deterministic record: a given Team Power ALWAYS yields the same W-L ----- */
    function record(power){ const wp=1/(1+Math.exp(-(power-CENTER)/SCALE)); const w=clamp(Math.round(wp*82),0,82); return {w,l:82-w,wp}; }

    /* ----- stint index: each player's seasons aggregated by decade (>=1960) + team ----- */
    const splitTeams = tm => String(tm||'').split('/').map(t=>t.trim()).filter(Boolean).filter(t=>t!=='TOT'&&t!=='TM');
    function buckets(p){ const s=(p.posF||p.pos||'').toUpperCase(); const set=[]; if(s.includes('G')) set.push('G'); if(s.includes('C')) set.push('C'); if(s.includes('F')||(!s.includes('G')&&!s.includes('C'))) set.push('F'); return set.length?set:['F']; }
    let STINTS=null, COMBOS=null;
    function buildStints(){
      STINTS=new Map();
      for(const p of DATA){
        const groups=new Map();
        for(const s of (p.sea||[])){
          if(s.y==null) continue; const dec=Math.floor(s.y/10)*10; if(dec<1960) continue;
          for(const tm of splitTeams(s.tm)){ const k=dec+'|'+tm; if(!groups.has(k)) groups.set(k,[]); groups.get(k).push(s); }
        }
        for(const [k,arr] of groups){
          const G=arr.reduce((a,s)=>a+(s.g||0),0); if(G<MING) continue;
          const w=f=>{ let n=0,d=0; for(const s of arr){ if(s[f]!=null&&isFinite(s[f])&&s.g){ n+=s[f]*s.g; d+=s.g; } } return d?n/d:null; };
          const parts=k.split('|'); const dec=+parts[0], tm=parts[1];
          const st={ n:p.n, id:p.id, img:p.img, yrs:p.yrs, dec:dec, tm:tm, g:G,
            ppg:w('ppg'), rpg:w('rpg'), apg:w('apg'), spg:w('spg'), bpg:w('bpg'),
            fg:w('fg'), tp:w('tp'), ft:w('ft'), efg:w('efg'), ts:w('ts'),
            mvp:p.mvp, allnba:p.allnba, allstar:p.allstar, dpoy:p.dpoy, roy:p.roy, hof:p.hof, po:p.po,
            posF:p.posF, pos:p.pos, bk:buckets(p), __ref:p };
          st.label = (st.posF||st.pos||'');
          if(!STINTS.has(k)) STINTS.set(k,[]); STINTS.get(k).push(st);
        }
      }
      COMBOS=[];
      for(const [k,arr] of STINTS){
        const g=arr.filter(s=>s.bk.includes('G')).length, f=arr.filter(s=>s.bk.includes('F')).length, c=arr.filter(s=>s.bk.includes('C')).length;
        if(g>=2&&f>=2&&c>=1) COMBOS.push(k);
      }
    }

    const SLOTS=[ {pos:'G',label:'Guard'}, {pos:'G',label:'Guard'}, {pos:'F',label:'Forward'}, {pos:'F',label:'Forward'}, {pos:'C',label:'Center'} ];
    let cur=null;      // {key, dec, tm, cands}
    let slots=[];      // picks aligned to SLOTS (stint | null)
    let hard=false, revealed=false;
    let bestWins = bestGet('perfect_wins');

    const decadeName = d => d+'s';
    const statline = s => (s.ppg!=null?s.ppg.toFixed(1):'—')+' · '+(s.rpg!=null?s.rpg.toFixed(1):'—')+' · '+(s.apg!=null?s.apg.toFixed(1):'—');

    function roll(){
      if(!STINTS) buildStints();
      if(!COMBOS.length){ stage.innerHTML=tooFew('Load the full database to play Perfect Season.'); return; }
      const key=rnd(COMBOS); const arr=STINTS.get(key); const parts=key.split('|');
      cur={ key:key, dec:+parts[0], tm:parts[1], cands:arr };
      slots=SLOTS.map(()=>null); revealed=false;
      render();
    }

    function pickFor(slotIdx){
      const want=SLOTS[slotIdx].pos;
      const chosen=new Set(slots.filter(Boolean).map(s=>s.n));
      const list=cur.cands.filter(s=>s.bk.includes(want)&&!chosen.has(s.n)).sort((a,b)=>(b.ppg||0)-(a.ppg||0));
      openPicker(slotIdx, list);
    }

    function openPicker(slotIdx, list){
      const head = hard
        ? '<tr><th class="l">#</th><th class="l">Player</th><th class="l">Pos</th><th class="r">Draft</th></tr>'
        : '<tr><th class="l">#</th><th class="l">Player</th><th class="l">Pos</th><th>PPG</th><th>RPG</th><th>APG</th><th>FG%</th><th>3P%</th><th>TS%</th><th>G</th></tr>';
      const rows=list.map((s,i)=>{
        if(hard) return '<tr data-i="'+i+'"><td class="rk">'+(i+1)+'</td><td class="nm">'+s.n+'</td><td class="pos">'+(s.label||'—')+'</td><td class="r"><span class="pk-go">Draft ›</span></td></tr>';
        return '<tr data-i="'+i+'"><td class="rk">'+(i+1)+'</td><td class="nm">'+s.n+'</td><td class="pos">'+(s.label||'—')+'</td><td class="lead">'+(s.ppg!=null?s.ppg.toFixed(1):'—')+'</td><td>'+(s.rpg!=null?s.rpg.toFixed(1):'—')+'</td><td>'+(s.apg!=null?s.apg.toFixed(1):'—')+'</td><td>'+(pct(s.fg)||'—')+'</td><td>'+(pct(s.tp)||'—')+'</td><td>'+(pct(s.ts)||'—')+'</td><td>'+(s.g||'—')+'</td></tr>';
      }).join('');
      const sub = teamName(cur.tm)+' · '+decadeName(cur.dec)+' · '+SLOTS[slotIdx].label;
      openModal('<div class="modal-head"><div><div class="modal-title">Choose a '+SLOTS[slotIdx].label+'</div><div class="modal-sub">'+sub+(hard?' · hard mode — stats hidden':' · sorted by PPG')+'</div></div><button class="modal-x" aria-label="Close">×</button></div><div class="modal-body"><div class="psc-scroll"><table class="ps-cands'+(hard?' hard':'')+'"><thead>'+head+'</thead><tbody>'+rows+'</tbody></table></div></div>');
      modal.querySelector('tbody').addEventListener('click', e=>{ const tr=e.target.closest('tr'); if(!tr) return; const s=list[+tr.dataset.i]; slots[slotIdx]=s; closeModal(); render(); });
    }

    function clearSlot(i){ slots[i]=null; revealed=false; render(); }
    function full(){ return slots.every(Boolean); }

    function render(){
      if(!cur){ renderIntro(); return; }
      const f = full()?formula(slots):null;
      score(f?Math.round(f.power):'—','Team Power', bestWins>0?(bestWins+'–'+(82-bestWins)):'—','Best Record');
      const teamHdr='<div class="ps-rollbar"><div class="ps-rollteam"><div class="ps-rolldec">'+decadeName(cur.dec)+'</div><div class="ps-rollname">'+teamName(cur.tm)+'</div><div class="ps-rollsub">'+cur.cands.length+' players logged 41+ games for this franchise that decade — pick your starting five</div></div><div class="ps-rollact"><label class="hardtog"><input type="checkbox" id="psHard"'+(hard?' checked':'')+'> Hard mode <span>— hide the stats</span></label><button class="gbtn ghost" id="psReroll">↻ Reroll franchise</button></div></div>';
      const board='<div class="ps-board">'+SLOTS.map((sl,i)=>{
        const s=slots[i];
        if(!s) return '<button class="ps-pslot empty" data-pick="'+i+'"><div class="ps-pslotpos">'+sl.label+'</div><div class="ps-pslotcta">Choose ›</div></button>';
        const r=rate(s);
        return '<div class="ps-pslot filled"><div class="ps-pslotpos">'+sl.label+'</div><div class="ps-ovr">'+r.ovr+'</div><div class="ps-pname">'+s.n+'</div><div class="ps-pmeta">'+(s.label||'')+' · '+s.g+' G</div><div class="ps-pline">'+statline(s)+'</div><div class="ps-pslotbtns"><button class="ps-x" data-rm="'+i+'">remove</button></div></div>';
      }).join('')+'</div>';
      const filled=slots.filter(Boolean).length;
      const runrow='<div class="ps-runrow">'+(full()
          ? '<button class="gbtn primary" id="psPlay">'+(revealed?'↻ Roll a new franchise':'Tip off — play the season →')+'</button>'
          : '<span class="ps-note">'+filled+'/5 starters drafted — choose '+(5-filled)+' more</span>')
        +(full()?'<button class="gbtn ghost" id="psReset">Clear lineup</button>':'')+'</div>';
      const result = (full()&&revealed) ? resultHTML(f) : '';
      const hint='<div class="ps-hint">The roll deals you a franchise and a decade (1960s onward). Draft one player for each spot from everyone who logged 41+ games for that team that decade — each is rated on his real production for that stint. Every five produces exactly one record: a complete, well-fit roster runs the table, a lopsided one gets buried. No dice and no luck — the same five always finish the same way.</div>';
      stage.innerHTML='<div class="ps-stage">'+teamHdr+board+runrow+result+hint+'</div>';
      const hd=stage.querySelector('#psHard'); if(hd) hd.addEventListener('change', ()=>{ hard=hd.checked; render(); });
      const rr=stage.querySelector('#psReroll'); if(rr) rr.addEventListener('click', roll);
      stage.querySelector('.ps-board').addEventListener('click', e=>{ const pk=e.target.closest('[data-pick]'); if(pk){ pickFor(+pk.dataset.pick); return; } const rm=e.target.closest('[data-rm]'); if(rm){ clearSlot(+rm.dataset.rm); } });
      const pl=stage.querySelector('#psPlay'); if(pl) pl.addEventListener('click', ()=>{
        if(revealed){ roll(); return; }
        revealed=true; const rec=record(f.power); if(rec.w>bestWins){ bestWins=rec.w; bestSet('perfect_wins',bestWins); }
        render(); const r=stage.querySelector('.ps-roll'); if(r) r.scrollIntoView({behavior:'smooth',block:'center'});
      });
      const rs=stage.querySelector('#psReset'); if(rs) rs.addEventListener('click', ()=>{ slots=SLOTS.map(()=>null); revealed=false; render(); });
    }

    function resultHTML(f){
      const rec=record(f.power);
      const tags=[];
      if(f.power>=86) tags.push('<span class="badge gold">Immortal — ran the table</span>');
      else if(f.power>=78) tags.push('<span class="badge gold">All-time juggernaut</span>');
      if(f.offense>=82) tags.push('<span class="badge">Elite offense</span>');
      if(f.defense>=80) tags.push('<span class="badge">Lockdown defense</span>');
      if(f.anchor) tags.push('<span class="badge">Rim protector</span>');
      if(f.shooters>=4) tags.push('<span class="badge">Spacing</span>');
      if(f.postAvg>=72) tags.push('<span class="badge">Proven in the playoffs</span>');
      if(!f.hasBig) tags.push('<span class="badge warn">No true big</span>');
      if(f.guards>=4) tags.push('<span class="badge warn">Guard-heavy</span>');
      if(f.usageGlut>8) tags.push('<span class="badge warn">Too many mouths to feed</span>');
      const bar=(lab,v,cls)=>'<div class="ps-bar'+(cls?' '+cls:'')+'"><span class="bl">'+lab+'</span><span class="bt"><span class="bf" style="width:'+clamp(v,0,100)+'%"></span></span><span class="bn">'+Math.round(v)+'</span></div>';
      return '<div class="ps-roll">'+
        '<div class="ps-rtop">'+
          '<div class="ps-recbox"><div class="ps-reclabel">'+decadeName(cur.dec)+' '+teamName(cur.tm)+' · final record</div><div class="ps-record"><span class="ww">'+rec.w+'</span><span class="sep">–</span><span class="ll">'+rec.l+'</span></div><div class="ps-recsub">Team Power '+Math.round(f.power)+' · the fixed result for this exact five</div></div>'+
          '<div class="ps-bars">'+bar('Team Power',f.power,'power')+bar('Offense',f.offense)+bar('Defense',f.defense)+bar('Rebounding',f.rebounding)+bar('Spacing',f.spaceTeam)+bar('Postseason',f.postAvg)+'</div>'+
        '</div>'+
        (tags.length?'<div class="ps-tags">'+tags.join('')+'</div>':'')+
      '</div>';
    }

    function renderIntro(){
      score('—','Team Power', bestWins>0?(bestWins+'–'+(82-bestWins)):'—','Best Record');
      stage.innerHTML='<div class="ps-stage"><div class="ps-intro"><div class="ps-intromark"></div><div class="eyebrow">Perfect Season</div><h2 class="ps-introh">Roll a franchise. Draft five. Chase 82–0.</h2><p class="ps-introp">We deal you a team and a decade from 1960 on. Build a starting five from everyone who suited up for that franchise that decade — and every lineup carries one fixed, calculated record. Flip on hard mode to draft blind, with the box scores hidden.</p><button class="gbtn primary big" id="psRoll">↻ Roll my franchise</button></div></div>';
      const rb=stage.querySelector('#psRoll'); if(rb) rb.addEventListener('click', roll);
    }

    function start(){ if(!PCT) buildPct(); if(!STINTS) buildStints(); bestWins=bestGet('perfect_wins'); cur=null; render(); }
    function stop(){}
    return { name:'Perfect Season', tag:'Roll a franchise and a decade, draft a starting five from its all-decade pool, and see the one record that lineup is destined for.', start, stop };
  })();

  const REG=[
    {id:'perfect',g:GAMES.perfect},
    {id:'otr',g:GAMES.otr},
    {id:'hilo',g:GAMES.hilo},
    {id:'season',g:GAMES.season},
    {id:'charts',g:GAMES.charts},
    {id:'price',g:GAMES.price},
    {id:'college',g:GAMES.college}
  ];
  let activeId=null;
  function launch(id){
    const e=REG.find(r=>r.id===id); if(!e) return;
    if(activeId){ const p=REG.find(r=>r.id===activeId); if(p&&p.g.stop) p.g.stop(); }
    activeId=id;
    modesMenu.classList.add('hidden'); gameArea.classList.remove('hidden');
    elT.textContent=e.g.name; elTag.textContent=e.g.tag; stage.innerHTML='';
    e.g.start();
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function back(){
    if(activeId){ const p=REG.find(r=>r.id===activeId); if(p&&p.g.stop) p.g.stop(); }
    activeId=null;
    gameArea.classList.add('hidden'); modesMenu.classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
  }
  backBtn.addEventListener('click', back);
  return { launch, back, list:()=>REG.map(r=>({id:r.id, name:r.g.name, tag:r.g.tag})) };
})();

/* ===================== MODES MENU ===================== */
const Modes = (function(){
  const menu=document.getElementById('modesMenu');
  function init(){
    const items=Game.list();
    const tiles=items.map((it,i)=>{
      const feat = it.id==='perfect';
      return '<button class="mode-tile'+(feat?' feat':'')+'" data-id="'+it.id+'"><div class="mode-num">'+String(i+1).padStart(2,'0')+'</div><div class="mode-body"><div class="mode-name">'+it.name+(feat?'<span class="feat-flag">New</span>':'')+'</div><div class="mode-tag">'+it.tag+'</div></div><div class="mode-go">Play ›</div></button>';
    }).join('');
    menu.innerHTML='<div class="modes-hero"><div class="eyebrow">The Back Pages</div><h1>Game Modes</h1><p>Seven ways to test your NBA history. Build a dream five and chase a perfect season, run trivia streaks, or race the clock on an all-time leaderboard.</p></div><div class="modes-list">'+tiles+'</div>';
    menu.querySelector('.modes-list').addEventListener('click', e=>{ const t=e.target.closest('.mode-tile'); if(!t) return; Game.launch(t.dataset.id); });
  }
  return { init };
})();

/* ===================== BOOT ===================== */
showView('home');
</script>
</body>
</html>
