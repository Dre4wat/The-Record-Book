*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--ink); font-family:var(--b);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1200px 600px at 80% -10%, rgba(240,180,41,.10), transparent 60%),
    radial-gradient(1000px 500px at 0% 0%, rgba(216,48,46,.06), transparent 55%),
    repeating-linear-gradient(115deg, rgba(255,255,255,.012) 0 2px, transparent 2px 7px);
  background-attachment:fixed;
  min-height:100vh;
}
::selection{background:var(--blue);color:#1A1206}
a{color:var(--blue);text-decoration:none}
button{font-family:inherit}
.hidden{display:none !important}

/* ---------- app bar ---------- */
.appbar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  padding:13px clamp(14px,3vw,34px);
  background:linear-gradient(180deg, rgba(12,11,14,.96), rgba(12,11,14,.82));
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  box-shadow:0 1px 0 rgba(240,180,41,.25), 0 10px 30px rgba(0,0,0,.4);
}
.brand{display:flex;align-items:center;gap:13px;min-width:0}
.brand-mark{width:46px;height:46px;flex:none;background:var(--logo) center/contain no-repeat;filter:drop-shadow(0 3px 9px rgba(0,0,0,.55))}
.brand-1{font-family:var(--d);font-weight:800;font-style:italic;font-size:21px;letter-spacing:.01em;line-height:1;text-transform:uppercase;white-space:nowrap}
.brand-2{font-family:var(--b);font-weight:600;font-size:9.5px;letter-spacing:.26em;color:var(--ink-faint);text-transform:uppercase;margin-top:3px;white-space:nowrap}
.mainnav{display:flex;gap:9px;flex:none}
.nav-b{
  font-family:var(--d);font-weight:700;font-style:italic;font-size:15px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--ink-dim);background:var(--panel);border:1px solid var(--line);
  padding:10px 20px;cursor:pointer;transition:.16s;
  clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
}
.nav-b:hover{color:var(--ink);border-color:var(--blue);background:var(--panel2)}
.nav-b.on{color:#1A1206;background:linear-gradient(135deg,var(--blue),#FFCB54);border-color:transparent;box-shadow:0 0 20px var(--blue-glow)}

main{max-width:1240px;margin:0 auto;padding:clamp(16px,3vw,30px) clamp(12px,3vw,26px) 80px}
.view{display:none;animation:fade .35s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.16)}100%{transform:scale(1)}}

/* ---------- section eyebrow ---------- */
.eyebrow{font-family:var(--b);font-weight:700;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--blue)}

/* ---------- selects / controls ---------- */
.ros-controls{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:22px}
.sel-wrap{display:flex;flex-direction:column;gap:6px}
.sel-wrap label{font-family:var(--b);font-weight:700;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint)}
.sel{position:relative}
select.styled{
  appearance:none;-webkit-appearance:none;
  font-family:var(--d);font-weight:700;font-size:17px;letter-spacing:.01em;text-transform:uppercase;
  color:var(--ink);background:var(--panel);border:1px solid var(--line);
  padding:11px 42px 11px 16px;cursor:pointer;outline:none;min-width:230px;transition:.15s;
  clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px);
}
select.styled:hover{border-color:var(--blue)}
select.styled:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(240,180,41,.18)}
.sel::after{content:'';position:absolute;right:16px;top:50%;width:9px;height:9px;border-right:2px solid var(--blue);border-bottom:2px solid var(--blue);transform:translateY(-65%) rotate(45deg);pointer-events:none}
select.styled option{background:#100E12;color:var(--ink)}

/* ---------- roster hero (2K detail card) ---------- */
.ros-hero{margin-bottom:18px;min-height:10px}
.ph-card{
  position:relative;display:grid;grid-template-columns:auto 1fr;gap:clamp(16px,3vw,34px);
  background:
    radial-gradient(420px 280px at 14% 0%, rgba(240,180,41,.16), transparent 62%),
    linear-gradient(120deg,var(--panel2),var(--bg2) 70%);
  border:1px solid var(--line);border-radius:6px;overflow:hidden;
  padding:clamp(16px,3vw,26px);animation:rise .4s ease;
}
.ph-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(125deg,rgba(255,255,255,.018) 0 2px,transparent 2px 9px);pointer-events:none}
.ph-shot{
  position:relative;width:clamp(118px,20vw,168px);aspect-ratio:1;flex:none;align-self:start;
  border-radius:6px;overflow:hidden;background:linear-gradient(150deg,var(--gold-1),var(--gold-2));
  box-shadow:0 12px 34px rgba(0,0,0,.5), 0 0 0 1px rgba(255,213,106,.5), 0 0 26px rgba(255,213,106,.18);
}
.ph-shot img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;filter:saturate(1.05)}
.ph-shot .mono{width:100%;height:100%;display:grid;place-items:center;font-family:var(--d);font-weight:800;font-style:italic;font-size:54px;color:#1a1407;background:linear-gradient(150deg,var(--gold-1),var(--gold-2))}
.ph-rank{position:absolute;top:9px;left:9px;font-family:var(--d);font-weight:800;font-style:italic;font-size:13px;color:#1a1407;background:rgba(255,255,255,.62);padding:1px 9px;border-radius:2px}
.ph-main{min-width:0;display:flex;flex-direction:column}
.ph-team{font-family:var(--b);font-weight:700;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue)}
.ph-name{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:clamp(34px,6vw,58px);line-height:.86;letter-spacing:.005em;margin:5px 0 2px}
.ph-sub{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:8px 0 4px}
.chip{font-family:var(--m);font-weight:600;font-size:12px;letter-spacing:.02em;color:var(--ink-dim);background:var(--raised);border:1px solid var(--line);border-radius:100px;padding:4px 12px}
.chip.pos{color:var(--blue);border-color:rgba(240,180,41,.4)}
.ph-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(58px,1fr));gap:1px;background:var(--line-soft);border:1px solid var(--line-soft);border-radius:3px;overflow:hidden;margin:14px 0}
.ph-st{background:rgba(8,11,20,.6);padding:9px 6px;text-align:center}
.ph-st b{display:block;font-family:var(--m);font-weight:700;font-size:18px;color:var(--ink)}
.ph-st.lead b{color:var(--gold-1)}
.ph-st span{display:block;font-family:var(--b);font-weight:600;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:2px}
.ph-st .na{color:var(--ink-faint)}
.ph-profile{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px 22px;margin-top:4px;padding-top:14px;border-top:1px solid var(--line-soft)}
.pf{min-width:0}
.pf-k{font-family:var(--b);font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.pf-v{font-family:var(--m);font-weight:600;font-size:15px;color:var(--ink);margin-top:2px;line-height:1.25}
.pf-v .sub{display:block;font-family:var(--b);font-weight:500;font-size:11px;color:var(--ink-dim);letter-spacing:.01em}
.pf-v.na{color:var(--ink-faint)}
.ph-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.ph-foot{margin-top:16px}

/* badges */
.badge{font-family:var(--b);font-weight:700;font-size:10.5px;letter-spacing:.04em;color:var(--ink-dim);background:var(--raised);border:1px solid var(--line);border-radius:3px;padding:4px 10px;text-transform:uppercase}
.badge.gold{color:#2a2008;background:linear-gradient(135deg,var(--gold-1),var(--gold-2));border-color:transparent}
.badge.hof{color:var(--gold-1);border-color:rgba(255,213,106,.45);background:rgba(255,213,106,.08)}
.badge.blue{color:#1A1206;background:linear-gradient(135deg,var(--blue),#FFCB54);border-color:transparent}
.badge.warn{color:#ffb38f;border-color:rgba(255,120,80,.4);background:rgba(255,120,80,.08)}

/* ---------- roster table ---------- */
.ros-table{animation:rise .4s ease .04s both}
.rt-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:10px}
.rt-title{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:20px;letter-spacing:.01em}
.rt-note{font-family:var(--m);font-weight:600;font-size:12px;color:var(--ink-faint)}
.rt-scroll{overflow-x:auto;border:1px solid var(--line);border-radius:5px;background:var(--bg2)}
table.roster{width:100%;border-collapse:collapse;min-width:680px}
table.roster th{
  font-family:var(--b);font-weight:700;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);
  text-align:right;padding:11px 9px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;white-space:nowrap;
}
table.roster th.l{text-align:left}
table.roster th.lead{color:var(--gold-1)}
table.roster td{font-family:var(--m);font-weight:600;font-size:14px;text-align:right;padding:10px 9px;border-bottom:1px solid var(--line-soft);white-space:nowrap;color:var(--ink-dim)}
table.roster td.na{color:var(--ink-faint)}
table.roster tr{cursor:pointer;transition:background .12s}
table.roster tbody tr:hover{background:rgba(240,180,41,.07)}
table.roster tr.active{background:rgba(240,180,41,.13)}
table.roster tr.active td{color:var(--ink)}
table.roster td.rk{text-align:center;color:var(--ink-faint);font-size:12px;width:34px}
table.roster td.nm{text-align:left;font-family:var(--d);font-weight:700;font-size:17px;letter-spacing:.01em;color:var(--ink);width:100%}
table.roster tr.active td.nm{color:var(--blue)}
table.roster td.pos{text-align:left;color:var(--ink-faint);font-size:12px}
table.roster td.lead{font-family:var(--m);font-weight:700;font-size:16px;color:var(--gold-1)}

/* ---------- game modes menu (2K main menu) ---------- */
.modes-wrap{animation:fade .35s ease}
.modes-hero{margin-bottom:22px}
.modes-hero .eyebrow{margin-bottom:7px}
.modes-hero h1{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:clamp(38px,8vw,76px);line-height:.84;letter-spacing:.004em;margin:0}
.modes-hero p{color:var(--ink-dim);max-width:560px;margin:12px 0 0;font-size:14px}
.modes-list{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.mode-tile{
  position:relative;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:18px;
  background:linear-gradient(100deg,var(--panel2),var(--bg2) 80%);
  border:1px solid var(--line);padding:16px 22px;cursor:pointer;text-align:left;
  transition:.18s;overflow:hidden;
  clip-path:polygon(var(--cut) 0,100% 0,100% calc(100% - var(--cut)),calc(100% - var(--cut)) 100%,0 100%,0 var(--cut));
}
.mode-tile::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--line);transition:.18s}
.mode-tile:hover{border-color:var(--blue);transform:translateX(6px);background:linear-gradient(100deg,var(--raised),var(--panel) 80%)}
.mode-tile:hover::before{background:linear-gradient(var(--blue),var(--blue-deep));box-shadow:0 0 18px var(--blue-glow)}
.mode-num{font-family:var(--d);font-weight:800;font-style:italic;font-size:26px;color:var(--ink-faint);width:34px;text-align:center;transition:.18s}
.mode-tile:hover .mode-num{color:var(--blue)}
.mode-body{min-width:0}
.mode-name{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:clamp(22px,3.4vw,30px);line-height:.94;letter-spacing:.01em}
.mode-tag{font-family:var(--b);font-weight:500;font-size:12.5px;color:var(--ink-dim);margin-top:3px;line-height:1.35}
.mode-go{font-family:var(--d);font-weight:700;font-style:italic;font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);transition:.18s;white-space:nowrap}
.mode-tile:hover .mode-go{color:var(--blue);transform:translateX(3px)}
.mode-tile.feat{background:linear-gradient(100deg,rgba(240,180,41,.14),var(--bg2) 80%);border-color:rgba(240,180,41,.4)}
.mode-tile.feat .mode-name{color:#fff}
.feat-flag{font-family:var(--b);font-weight:700;font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:#1A1206;background:linear-gradient(135deg,var(--gold-1),var(--gold-2));padding:2px 8px;border-radius:2px;margin-left:10px;vertical-align:middle}

/* ---------- game area ---------- */
.game-head{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.back-b{font-family:var(--d);font-weight:700;font-style:italic;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-dim);background:var(--panel);border:1px solid var(--line);padding:9px 16px;cursor:pointer;transition:.15s;clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px)}
.back-b:hover{color:var(--ink);border-color:var(--blue)}
.game-titles{min-width:0;flex:1}
.g-title{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:clamp(24px,4vw,34px);line-height:.9;letter-spacing:.006em}
.g-tag{font-family:var(--b);font-weight:500;font-size:13px;color:var(--ink-dim);margin-top:4px;max-width:620px}
.scoreboard{display:flex;gap:9px;flex:none}
.sb{min-width:78px;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:9px 12px}
.sb-v{font-family:var(--m);font-weight:700;font-size:23px;color:var(--blue);line-height:1}
.sb-k{font-family:var(--b);font-weight:700;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px}
.sb.pop{animation:pop .4s ease}
.game-stage{min-height:200px}

/* ---------- shared game UI ---------- */
.gbtn{font-family:var(--d);font-weight:700;font-style:italic;letter-spacing:.06em;text-transform:uppercase;font-size:15px;border:none;padding:0 24px;cursor:pointer;transition:.15s;min-height:46px;color:#1A1206;background:linear-gradient(135deg,var(--blue),#FFCB54);clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
.gbtn:hover{filter:brightness(1.08)}
.gbtn.primary{color:#1A1206;background:linear-gradient(135deg,var(--blue),#FFCB54);box-shadow:0 0 18px var(--blue-glow)}
.gbtn.ghost{background:var(--panel);color:var(--ink-dim);border:1px solid var(--line)}
.gbtn.ghost:hover{color:var(--ink);border-color:var(--blue);filter:none}
.gbtn:disabled{opacity:.4;cursor:default;filter:grayscale(.4) !important;box-shadow:none}
.game-controls{display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
.guessbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:100px;overflow:hidden;background:var(--panel)}
.seg-b{font-family:var(--b);font-weight:600;font-size:11px;letter-spacing:.07em;text-transform:uppercase;background:transparent;color:var(--ink-faint);border:none;padding:8px 17px;cursor:pointer;transition:.16s}
.seg-b:hover{color:var(--ink-dim)}
.seg-b.on{background:linear-gradient(135deg,var(--blue),#FFCB54);color:#1A1206}
.blindtog{display:inline-flex;align-items:center;gap:8px;font-family:var(--b);font-size:13px;color:var(--ink-dim);cursor:pointer}
.blindtog input{accent-color:var(--blue);width:15px;height:15px}
.blindtog span{color:var(--ink-faint);font-size:12px}
.verdict{font-family:var(--b);font-weight:500;font-size:14px;color:var(--ink-dim);margin-top:14px}
.verdict.good{color:var(--green)}
.verdict.bad{color:var(--red)}
.game-empty{text-align:center;padding:46px 20px;color:var(--ink-faint)}
.game-empty .big{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:26px;color:var(--ink-dim);margin-bottom:8px}
.game-empty p{max-width:430px;margin:0 auto;font-size:13px}

/* mystery / stat panels */
.mystery{background:var(--bg2);border:1px solid var(--line);border-radius:5px;overflow:hidden;margin-bottom:16px}
.mystery-top{display:flex;align-items:center;gap:15px;padding:15px 19px;border-bottom:1px solid var(--line-soft);background:linear-gradient(180deg,rgba(240,180,41,.06),transparent);flex-wrap:wrap}
.mystery-clue{font-family:var(--m);font-weight:600;font-size:12px;color:var(--ink-dim);letter-spacing:.01em}
.redact-bar{height:18px;width:160px;background:repeating-linear-gradient(90deg,var(--raised) 0 18px,transparent 18px 22px);border-radius:2px;flex:none}
.pos-pill{display:inline-flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);border-radius:100px;padding:5px 14px 5px 12px;flex:none}
.pos-pill .pp-k{font-family:var(--b);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
.pos-pill .pp-v{font-family:var(--d);font-weight:700;font-style:italic;font-size:15px;letter-spacing:.02em;color:var(--blue)}
.pos-pill .pp-v.na{color:var(--ink-faint);font-style:normal}
.avatar{width:46px;height:46px;flex:none;border-radius:4px;overflow:hidden;background:var(--raised)}
.avatar img{width:100%;height:100%;object-fit:cover;object-position:top center}
.avatar.mono,.avatar .mono{width:100%;height:100%;display:grid;place-items:center;font-family:var(--d);font-weight:800;font-style:italic;font-size:18px;color:var(--blue);background:var(--raised)}
.statgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:1px;background:var(--line-soft);border:1px solid var(--line-soft);border-radius:3px;overflow:hidden}
.cell{background:rgba(8,11,20,.6);padding:11px 6px;text-align:center}
.cell .cv{font-family:var(--m);font-weight:700;font-size:18px;color:var(--ink)}
.cell .cv.na{color:var(--ink-faint)}
.cell .cv.po{color:var(--gold-1)}
.cell .ck{font-family:var(--b);font-weight:600;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-top:3px}
.seasonwrap{overflow:auto;max-height:340px;border-radius:4px}
table.seasons{width:100%;border-collapse:collapse;min-width:540px}
table.seasons th{font-family:var(--b);font-weight:700;font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);text-align:right;padding:8px 7px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;white-space:nowrap}
table.seasons td{font-family:var(--m);font-weight:600;font-size:13px;text-align:right;padding:7px;border-bottom:1px solid var(--line-soft);color:var(--ink-dim);white-space:nowrap}
table.seasons td.na{color:var(--ink-faint)}
table.seasons td.yr{font-family:var(--d);font-weight:700;color:var(--ink);text-align:left}
table.seasons td.tmc{text-align:left;color:var(--blue)}
table.seasons td.tmc.blind{color:var(--ink-faint)}
table.seasons th:first-child,table.seasons th:nth-child(3){text-align:left}

/* reveal */
.reveal{display:flex;align-items:center;gap:14px;background:linear-gradient(100deg,rgba(70,224,139,.12),transparent);border:1px solid rgba(70,224,139,.3);border-radius:5px;padding:14px 18px;margin-top:14px;animation:rise .3s ease}
.reveal.bad{background:linear-gradient(100deg,rgba(216,48,46,.12),transparent);border-color:rgba(216,48,46,.3)}
.rv-name{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:24px;line-height:.95}
.rv-meta{font-family:var(--m);font-weight:600;font-size:12px;color:var(--ink-dim);margin-top:3px}

/* higher-or-lower */
.hl-q{font-family:var(--d);font-weight:700;font-style:italic;font-size:22px;text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:.01em}
.hl-q b{color:var(--blue)}
.hl-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px}
.hl-card{background:linear-gradient(160deg,var(--panel2),var(--bg2));border:1px solid var(--line);border-radius:6px;padding:22px 16px;text-align:center;cursor:pointer;transition:.16s;color:var(--ink)}
.hl-card:hover{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,.4)}
.hl-card.done{cursor:default}
.hl-card.win{border-color:var(--green);box-shadow:0 0 22px rgba(70,224,139,.25)}
.hl-name{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:23px;line-height:.96}
.hl-meta{font-family:var(--m);font-weight:600;font-size:12px;color:var(--ink-dim);margin-top:5px}
.hl-meta.dim{color:var(--ink-faint)}
.hl-val{font-family:var(--m);font-weight:700;font-size:34px;color:var(--gold-1);margin-top:12px;min-height:34px}
.hl-vs{font-family:var(--d);font-weight:800;font-style:italic;font-size:18px;color:var(--ink-faint)}

/* options (season game) */
.opt-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:6px}
.opt-b{font-family:var(--m);font-weight:700;font-size:16px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:14px 10px;cursor:pointer;transition:.14s}
.opt-b:hover{border-color:var(--blue);background:var(--panel2)}
.opt-b.right{border-color:var(--green);color:var(--green);background:rgba(70,224,139,.1)}
.opt-b.wrong{border-color:var(--red);color:var(--red);background:rgba(216,48,46,.1)}
.opt-b:disabled{cursor:default}

/* top of the charts */
.toc-timer{font-family:var(--m);font-weight:700;font-size:20px;color:var(--blue);margin-left:auto}
.toc-timer.flash{animation:pop .3s ease;color:var(--red)}
.toc-head{display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between;margin-bottom:14px}
.toc-cat{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:19px}
.toc-board{display:flex;flex-direction:column;gap:5px}
.toc-row{display:grid;grid-template-columns:34px 1fr auto;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line-soft);border-radius:3px;padding:9px 14px}
.toc-rank{font-family:var(--d);font-weight:800;font-style:italic;font-size:16px;color:var(--ink-faint);text-align:center}
.toc-name{font-family:var(--d);font-weight:700;font-size:17px;color:var(--ink-faint)}
.toc-row.hit{border-color:rgba(70,224,139,.4);background:rgba(70,224,139,.08)}
.toc-row.hit .toc-name{color:var(--green)}
.toc-row.hit .toc-rank{color:var(--green)}
.toc-row.miss .toc-name{color:var(--ink-dim)}
.toc-stat{font-family:var(--m);font-weight:700;font-size:15px;color:var(--ink)}

/* autocomplete */
.ac-wrap{position:relative;flex:1;min-width:200px}
.ac-wrap input{width:100%;font-family:var(--b);font-size:15px;color:var(--ink);background:var(--bg2);border:1px solid var(--line);border-radius:4px;padding:13px 15px;outline:none;transition:.15s}
.ac-wrap input::placeholder{color:var(--ink-faint)}
.ac-wrap input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(240,180,41,.16)}
.ac-list{position:absolute;left:0;right:0;top:calc(100% + 5px);background:#100E12;border:1px solid var(--line);border-radius:5px;overflow:hidden;z-index:30;display:none;box-shadow:0 16px 40px rgba(0,0,0,.55)}
.ac-list.show{display:block}
.ac-item{display:flex;justify-content:space-between;gap:10px;align-items:baseline;padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--line-soft)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.sel{background:rgba(240,180,41,.14)}
.ac-item span:first-child{font-family:var(--d);font-weight:600;font-size:15px}
.ai-meta{font-family:var(--m);font-size:11px;color:var(--ink-faint)}

/* ---------- Perfect Season (82-0) ---------- */
.ps-controls{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-bottom:18px}
.ps-addrow{flex:1;min-width:240px}
.ps-addrow label{display:block;font-family:var(--b);font-weight:700;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.ps-roster{display:grid;grid-template-columns:repeat(auto-fit,minmax(184px,1fr));gap:11px;margin-bottom:18px}
.ps-slot{position:relative;background:linear-gradient(160deg,var(--panel2),var(--bg2));border:1px solid var(--line-soft);border-radius:5px;padding:14px;min-height:128px;display:flex;flex-direction:column;gap:7px}
.ps-slot.filled{border-color:var(--line)}
.ps-slot.empty{align-items:center;justify-content:center;border-style:dashed;color:var(--ink-faint);text-align:center;font-family:var(--b);font-size:12px}
.ps-slotn{font-family:var(--b);font-weight:700;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.ps-pname{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:19px;line-height:.96;padding-right:44px}
.ps-pmeta{font-family:var(--m);font-weight:600;font-size:10.5px;color:var(--ink-dim);letter-spacing:.01em}
.ps-pline{font-family:var(--m);font-weight:600;font-size:11px;color:var(--ink-dim);margin-top:auto}
.ps-ovr{position:absolute;top:11px;right:11px;width:38px;height:38px;display:grid;place-items:center;font-family:var(--d);font-weight:800;font-style:italic;font-size:17px;color:#1A1206;background:linear-gradient(150deg,var(--gold-1),var(--gold-2));border-radius:4px;box-shadow:0 0 14px rgba(255,213,106,.3)}
.ps-x{position:absolute;bottom:11px;right:11px;font-family:var(--b);font-size:11px;color:var(--ink-faint);background:transparent;border:1px solid var(--line);border-radius:3px;padding:3px 9px;cursor:pointer;transition:.14s}
.ps-x:hover{color:var(--red);border-color:var(--red)}
.ps-runrow{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:18px}
.ps-note{font-family:var(--m);font-weight:600;font-size:12px;color:var(--ink-faint)}

/* results + ring */
.ps-results{animation:rise .4s ease}
.ps-rtop{display:grid;grid-template-columns:auto 1fr;gap:clamp(16px,3vw,30px);align-items:center;background:radial-gradient(360px 240px at 12% 0%,rgba(240,180,41,.16),transparent 60%),linear-gradient(120deg,var(--panel2),var(--bg2) 75%);border:1px solid var(--line);border-radius:6px;padding:clamp(16px,3vw,24px);margin-bottom:14px}
.ring{position:relative;width:150px;height:150px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .rc-track{fill:none;stroke:var(--line);stroke-width:11}
.ring .rc-fill{fill:none;stroke-width:11;stroke-linecap:round;filter:drop-shadow(0 0 7px currentColor);transition:stroke-dashoffset 1s cubic-bezier(.2,.8,.2,1)}
.ring .rc-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .rc-num{font-family:var(--d);font-weight:800;font-style:italic;font-size:34px;line-height:1}
.ring .rc-lab{font-family:var(--b);font-weight:700;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin-top:4px}
.ps-rmain{min-width:0}
.ps-rlabel{font-family:var(--b);font-weight:700;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint)}
.ps-record{font-family:var(--d);font-weight:800;font-style:italic;font-size:clamp(40px,8vw,62px);line-height:.84;margin:4px 0 2px}
.ps-record .ww{color:var(--green)}.ps-record .sep{color:var(--ink-faint);margin:0 3px}.ps-record .ll{color:var(--ink-dim)}
.ps-meta{display:flex;flex-wrap:wrap;gap:18px;font-family:var(--m);font-weight:600;font-size:12px;color:var(--ink-dim);margin-top:12px}
.ps-meta b{color:var(--ink)}
.ps-bars{display:flex;flex-direction:column;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:16px 18px;margin-bottom:14px}
.ps-bar{display:grid;grid-template-columns:92px 1fr 32px;align-items:center;gap:11px}
.ps-bar .bl{font-family:var(--b);font-weight:600;font-size:11px;color:var(--ink-dim);letter-spacing:.02em}
.ps-bar .bt{height:8px;background:var(--raised);border:1px solid var(--line-soft);border-radius:5px;overflow:hidden}
.ps-bar .bf{height:100%;background:linear-gradient(90deg,var(--blue-deep),var(--blue));border-radius:5px}
.ps-bar.power .bf{background:linear-gradient(90deg,var(--gold-2),var(--gold-1))}
.ps-bar .bn{font-family:var(--m);font-weight:700;font-size:13px;color:var(--ink);text-align:right}
.ps-tags{display:flex;gap:7px;flex-wrap:wrap}
.ps-hint{font-family:var(--b);font-size:12px;color:var(--ink-faint);line-height:1.55;margin-top:16px;max-width:760px}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(4,7,14,.82);backdrop-filter:blur(6px);display:none;align-items:flex-start;justify-content:center;padding:clamp(12px,4vh,48px) 14px;overflow-y:auto}
.overlay.show{display:flex}
.modal{position:relative;width:100%;max-width:860px;background:linear-gradient(180deg,var(--panel2),var(--bg2));border:1px solid var(--line);border-radius:8px;box-shadow:0 30px 80px rgba(0,0,0,.7);animation:rise .3s ease}
.modal-head{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line-soft);position:sticky;top:0;background:linear-gradient(180deg,var(--panel2),rgba(18,26,44,.92));border-radius:8px 8px 0 0;z-index:2}
.modal-title{font-family:var(--d);font-weight:800;font-style:italic;text-transform:uppercase;font-size:24px;line-height:.95}

/* ===================== ROSTERS ===================== */
const Rosters = (function(){
  const seasonSel=document.getElementById('seasonSel');
  const teamSel=document.getElementById('teamSel');
  const heroEl=document.getElementById('rosHero');
  const tableEl=document.getElementById('rosTable');
  let built=false, SEASONS=[];
  const teamsBySeason=new Map();   // y -> Set(code)
  const rosterMap=new Map();       // 'y|code' -> [{p,s}]
  let curRoster=[], curSel=null, curY=null, curTm=null;

  const splitTeams = tm => String(tm||'').split('/').map(t=>t.trim()).filter(Boolean).filter(t=>t!=='TOT'&&t!=='TM');

  function build(){
    const tmp=new Map(); // 'y|code' -> Map(name -> {p,s})
    for(const p of DATA){
      for(const s of (p.sea||[])){
        if(s.y==null) continue;
        for(const code of splitTeams(s.tm)){
          if(!teamsBySeason.has(s.y)) teamsBySeason.set(s.y,new Set());
          teamsBySeason.get(s.y).add(code);
          const k=s.y+'|'+code;
          if(!tmp.has(k)) tmp.set(k,new Map());
          const m=tmp.get(k), ex=m.get(p.n);
          if(!ex || (s.g||0)>(ex.s.g||0)) m.set(p.n,{p,s});
        }
      }
    }
    for(const [k,m] of tmp) rosterMap.set(k,[...m.values()]);
    SEASONS=[...teamsBySeason.keys()].sort((a,b)=>b-a);
    built=true;
  }

  function fillTeams(y){
    const codes=[...(teamsBySeason.get(y)||[])].sort((a,b)=>teamName(a).localeCompare(teamName(b)));
    teamSel.innerHTML=codes.map(c=>'<option value="'+c+'">'+teamName(c)+'</option>').join('');
  }

  function renderRoster(y, code){
    curY=y; curTm=code;
    const list=(rosterMap.get(y+'|'+code)||[]).slice();
    list.sort((A,B)=>{ const a=A.s.ppg, b=B.s.ppg; if(a==null&&b==null)return 0; if(a==null)return 1; if(b==null)return -1; return b-a; });
    curRoster=list; curSel=list[0]||null;
    renderHero(); renderTable();
  }

  function renderTable(){
    const sc=(v,extra)=>{ const na=(v==null||v===''); return '<td class="'+(na?'na ':'')+(extra||'')+'">'+(na?'—':v)+'</td>'; };
    const rows=curRoster.map((e,i)=>{
      const p=e.p, s=e.s, active=curSel&&curSel.p.n===p.n, pos=p.posF||p.pos||'';
      return '<tr data-i="'+i+'"'+(active?' class="active"':'')+'>'+
        '<td class="rk">'+(i+1)+'</td>'+
        '<td class="nm">'+p.n+'</td>'+
        '<td class="pos">'+(pos||'—')+'</td>'+
        sc(s.ag!=null?s.ag:null)+
        '<td class="lead">'+(s.ppg!=null?s.ppg.toFixed(1):'—')+'</td>'+
        sc(fmt(s.rpg))+sc(fmt(s.apg))+sc(fmt(s.spg))+sc(fmt(s.bpg))+
        sc(pct(s.fg))+sc(pct(s.tp))+sc(pct(s.ft))+sc(pct(s.efg))+sc(pct(s.ts))+
        sc(fmt(s.mpg))+sc(s.g!=null?s.g:null)+'</tr>';
    }).join('');
    const head='<tr><th class="l">#</th><th class="l">Player</th><th class="l">Pos</th><th>Age</th><th class="lead">PTS</th><th>TRB</th><th>AST</th><th>STL</th><th>BLK</th><th>FG%</th><th>3P%</th><th>FT%</th><th>eFG%</th><th>TS%</th><th>MPG</th><th>G</th></tr>';
    tableEl.innerHTML='<div class="rt-head"><div class="rt-title">'+teamName(curTm)+' Roster</div><div class="rt-note">'+curRoster.length+' players · sorted by PPG · tap a name</div></div>'+
      '<div class="rt-scroll"><table class="roster"><thead>'+head+'</thead><tbody>'+rows+'</tbody></table></div>';
    tableEl.querySelector('tbody').addEventListener('click', e=>{ const tr=e.target.closest('tr'); if(!tr) return; const i=+tr.dataset.i; curSel=curRoster[i]; renderHero(); tableEl.querySelectorAll('tbody tr').forEach(x=>x.classList.toggle('active', +x.dataset.i===i)); });
  }

  function renderHero(){
    if(!curSel){ heroEl.innerHTML=''; return; }
    const p=curSel.p, s=curSel.s, rank=curRoster.indexOf(curSel)+1;
    const st=(v,k,lead)=>{ const na=(v==null||v===''); return '<div class="ph-st'+(lead?' lead':'')+'"><b class="'+(na?'na':'')+'">'+(na?'—':v)+'</b><span>'+k+'</span></div>'; };
    const strip='<div class="ph-stats">'+
      st(s.ppg!=null?s.ppg.toFixed(1):null,'PPG',true)+st(fmt(s.rpg),'RPG')+st(fmt(s.apg),'APG')+st(fmt(s.spg),'SPG')+st(fmt(s.bpg),'BPG')+
      st(pct(s.fg),'FG%')+st(pct(s.tp),'3P%')+st(pct(s.ft),'FT%')+st(pct(s.ts),'TS%')+st(fmt(s.mpg),'MPG')+st(s.g!=null?s.g:null,'G')+'</div>';
    const pf=(k,v,sub)=>{ const na=(v==null||v===''); return '<div class="pf"><div class="pf-k">'+k+'</div><div class="pf-v'+(na?' na':'')+'">'+(na?'—':v)+(sub&&!na?'<span class="sub">'+sub+'</span>':'')+'</div></div>'; };
    let draftV=null, draftS='';
    if(p.dft){ draftV=p.dft.tm||(p.dft.rd?('Round '+p.dft.rd):'Drafted'); draftS=(p.dft.pk?ordinal(p.dft.pk)+' overall':'')+(p.dft.yr?((p.dft.pk?' · ':'')+p.dft.yr):''); }
    else if(p.dft===null) draftV='Undrafted';
    const profile='<div class="ph-profile">'+
      pf('College',p.col)+pf('Draft',draftV,draftS)+pf('Born',p.by)+pf('Birthplace',p.bp)+pf('Career',p.yrs)+pf('Position',p.posF||p.pos)+'</div>';
    const bd=[];
    if(p.mvp>0) bd.push('<span class="badge gold">'+p.mvp+'× MVP</span>');
    if(p.allnba>0) bd.push('<span class="badge">'+p.allnba+'× All-NBA</span>');
    if(p.allstar>0) bd.push('<span class="badge">'+p.allstar+'× All-Star</span>');
    if(p.dpoy>0) bd.push('<span class="badge">'+p.dpoy+'× DPOY</span>');
    if(p.roy>0) bd.push('<span class="badge">Rookie of the Year</span>');
    if(p.hof) bd.push('<span class="badge hof">Hall of Fame</span>');
    const badges = bd.length?'<div class="ph-badges">'+bd.join('')+'</div>':'';
    const ini=initials(p.n).toUpperCase().replace(/[^A-Z]/g,'');
    const shot = p.img
      ? '<div class="ph-shot"><span class="ph-rank">#'+rank+'</span><img src="'+p.img+'" alt="" onerror="imgFail(this,&quot;'+ini+'&quot;)"></div>'
      : '<div class="ph-shot"><span class="ph-rank">#'+rank+'</span><div class="mono">'+ini+'</div></div>';
    heroEl.innerHTML='<div class="ph-card">'+shot+
      '<div class="ph-main">'+
        '<div class="ph-team">'+teamName(curTm)+' · '+seasonLabel(curY)+'</div>'+
        '<div class="ph-name">'+p.n+'</div>'+
        '<div class="ph-sub">'+((p.posF||p.pos)?'<span class="chip pos">'+(p.posF||p.pos)+'</span>':'')+(s.ag!=null?'<span class="chip">Age '+s.ag+'</span>':'')+(p.hof?'<span class="chip">HOF</span>':'')+'</div>'+
        strip+profile+badges+
        '<div class="ph-foot"><button class="gbtn primary" id="careerBtn">Career &amp; Season Stats →</button></div>'+
      '</div></div>';
    const cb=heroEl.querySelector('#careerBtn'); if(cb) cb.addEventListener('click', ()=>openCareer(p));
  }

  function openCareer(p){
    const sc=v=>{ const na=(v==null); return '<td class="'+(na?'na':'')+'">'+(na?'—':v)+'</td>'; };
    const cell=(v,k,cls)=>{ const na=(v==null); return '<div class="cell"><div class="cv'+(na?' na':'')+(cls?' '+cls:'')+'">'+(na?'—':v)+'</div><div class="ck">'+k+'</div></div>'; };
    const head=['Season','Age','Team','G','MPG','PPG','RPG','APG','SPG','BPG','FG%','3P%','FT%','TS%'];
    const rows=(p.sea||[]).map(s=>'<tr><td class="yr">'+seasonLabel(s.y)+'</td><td>'+(s.ag!=null?s.ag:'—')+'</td><td class="tmc">'+(s.tm||'—')+'</td>'+sc(s.g)+sc(fmt(s.mpg))+sc(fmt(s.ppg))+sc(fmt(s.rpg))+sc(fmt(s.apg))+sc(fmt(s.spg))+sc(fmt(s.bpg))+sc(pct(s.fg))+sc(pct(s.tp))+sc(pct(s.ft))+sc(pct(s.ts))+'</tr>').join('');
    const career='<div class="section-label">Career averages</div><div class="statgrid">'+
      cell(p.g!=null?p.g.toLocaleString():null,'Games')+cell(p.ppg!=null?p.ppg.toFixed(1):null,'PPG')+cell(fmt(p.rpg),'RPG')+cell(fmt(p.apg),'APG')+cell(fmt(p.spg),'SPG')+cell(fmt(p.bpg),'BPG')+cell(pct(p.fg),'FG%')+cell(pct(p.tp),'3P%')+cell(pct(p.ft),'FT%')+cell(pct(p.ts),'TS%')+'</div>';
    let po='';
    if(p.po && p.po.g){ po='<div class="section-label">Playoff résumé <span class="lab-tag">postseason</span></div><div class="statgrid">'+
      cell(p.po.g,'Games')+cell(fmt(p.po.ppg),'PPG')+cell(fmt(p.po.rpg),'RPG')+cell(fmt(p.po.apg),'APG')+cell(fmt(p.po.per),'PER','po')+cell(fmt(p.po.ws,1),'Win Shares','po')+cell(fmt(p.po.vorp,1),'VORP','po')+'</div>'+
      '<div class="adv-note">Playoff <b>PER</b>, <b>Win Shares</b>, and <b>VORP</b> are career postseason figures from Basketball Reference. Regular-season advanced metrics aren\u2019t carried in this dataset.</div>'; }
    const seasons=(p.sea&&p.sea.length)?'<div class="section-label">Season by season</div><div class="seasonwrap"><table class="seasons"><thead><tr>'+head.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows+'</tbody></table></div>':'';
    openModal('<div class="modal-head"><div><div class="modal-title">'+p.n+'</div><div class="modal-sub">'+(p.yrs||'')+(p.tm?' · '+p.tm:'')+'</div></div><button class="modal-x" aria-label="Close">×</button></div><div class="modal-body">'+career+po+seasons+'</div>');
  }

  function init(){
    if(!built) build();
    if(!SEASONS.length){ heroEl.innerHTML='<div class="game-empty"><div class="big">No season data</div><p>Drop nba-players.js beside this page and reload to browse rosters.</p></div>'; return; }
    seasonSel.innerHTML=SEASONS.map(y=>'<option value="'+y+'">'+seasonLabel(y)+'</option>').join('');
    seasonSel.value=String(SEASONS[0]);
    fillTeams(SEASONS[0]);
    renderRoster(SEASONS[0], teamSel.value);
    seasonSel.addEventListener('change', ()=>{ const y=+seasonSel.value; fillTeams(y); renderRoster(y, teamSel.value); });
    teamSel.addEventListener('change', ()=>renderRoster(+seasonSel.value, teamSel.value));
  }
  return { init, openCareer };
})();

/* ===================== SIMILAR PLAYERS (nearest-neighbour by production) ===================== */
const SIMPOOL = DATA.filter(p=>p.g!=null && p.g>=300 && (p.allstar>0||p.mvp>0||p.hof||(p.ppg!=null&&p.ppg>=16)));
const SIMF=['ppg','rpg','apg','spg','bpg','ts','tp'];
const SIMW=[1.25,1.0,1.1,0.7,0.7,0.9,0.8];
const SIMSTATS={};
(function(){ for(const f of SIMF){ const v=SIMPOOL.map(p=>p[f]).filter(x=>x!=null&&isFinite(x)); const m=v.reduce((a,b)=>a+b,0)/(v.length||1); const sd=Math.sqrt(v.reduce((a,b)=>a+(b-m)*(b-m),0)/(v.length||1))||1; SIMSTATS[f]={m,sd}; } })();
function simVec(p){ return SIMF.map(f=>{ const v=p[f]; const s=SIMSTATS[f]; return (v==null||!isFinite(v))?0:(v-s.m)/s.sd; }); }
function similarPlayers(target, n){
  const tv=simVec(target);
  return SIMPOOL.filter(p=>p.n!==target.n).map(p=>{ const v=simVec(p); let d=0; for(let i=0;i<v.length;i++){ const x=(v[i]-tv[i])*SIMW[i]; d+=x*x; } if((p.e||'')!==(target.e||'')) d+=0.5; return {p,d}; }).sort((a,b)=>a.d-b.d).slice(0,n||4).map(o=>o.p);
}

/* ===================== HOME ===================== */
const Home = (function(){
  const rnd = a => a[Math.floor(Math.random()*a.length)];
  const el = h => { const t=document.createElement('template'); t.innerHTML=(h||'').trim(); return t.content.firstElementChild; };
  const eraName = e => e ? e.charAt(0).toUpperCase()+e.slice(1)+' era' : '';
  const host = document.getElementById('homeWrap');
  const NIDX = DATA.map(p=>({p, k:norm(p.n)}));
  const SPOT = DATA.filter(p=>p.sea && p.sea.length>=3 && (p.allstar>0||p.mvp>0||p.hof||(p.ppg!=null&&p.ppg>=17)));
  let cur=null, revealed=false;

  function makeSearch(){
    const wrap=el('<div class="ac-wrap home-ac"></div>');
    const input=document.createElement('input'); input.type='text'; input.autocomplete='off'; input.placeholder='Search any player — LeBron, Wilt, Curry…';
    const ac=el('<div class="ac-list"></div>');
    wrap.appendChild(input); wrap.appendChild(ac);
    let items=[], sel=-1;
    const close=()=>{ ac.classList.remove('show'); items=[]; sel=-1; };
    const open=q=>{ const k=norm(q); if(k.length<2){close();return;} items=NIDX.filter(x=>x.k.includes(k)).slice(0,8); if(!items.length){close();return;} sel=-1; ac.innerHTML=items.map((x,i)=>'<div class="ac-item" data-i="'+i+'"><span>'+x.p.n+'</span><span class="ai-meta">'+(x.p.yrs||'')+'</span></div>').join(''); ac.classList.add('show'); };
    const paint=()=>{ [...ac.children].forEach((c,i)=>c.classList.toggle('sel',i===sel)); };
    const go=p=>{ if(p){ Rosters.openCareer(p); input.value=''; close(); } };
    const commit=()=>{ if(sel>=0&&items[sel]){ go(items[sel].p); return; } const k=norm(input.value); let m=NIDX.find(x=>x.k===k); if(!m){ const c=NIDX.filter(x=>x.k.includes(k)); if(c.length===1) m=c[0]; } if(m) go(m.p); else close(); };
    input.addEventListener('input', ()=>open(input.value));
    input.addEventListener('keydown', e=>{ if(e.key==='ArrowDown'){e.preventDefault(); if(items.length){sel=(sel+1)%items.length;paint();}} else if(e.key==='ArrowUp'){e.preventDefault(); if(items.length){sel=(sel-1+items.length)%items.length;paint();}} else if(e.key==='Enter'){e.preventDefault(); commit();} else if(e.key==='Escape'){close();} });
    input.addEventListener('blur', ()=>setTimeout(close,160));
    ac.addEventListener('mousedown', e=>{ const it=e.target.closest('.ac-item'); if(!it) return; e.preventDefault(); go(items[+it.dataset.i].p); });
    return { wrap, focus:()=>input.focus() };
  }

  function awardsHTML(p){
    const bd=[];
    if(p.mvp>0) bd.push('<span class="badge gold">'+p.mvp+'× MVP</span>');
    if(p.allnba>0) bd.push('<span class="badge">'+p.allnba+'× All-NBA</span>');
    if(p.allstar>0) bd.push('<span class="badge">'+p.allstar+'× All-Star</span>');
    if(p.dpoy>0) bd.push('<span class="badge">'+p.dpoy+'× DPOY</span>');
    if(p.roy>0) bd.push('<span class="badge">Rookie of the Year</span>');
    if(p.hof) bd.push('<span class="badge hof">Hall of Fame</span>');
    return bd.join('');
  }
  function bestSeason(p){
    const ss=(p.sea||[]).filter(s=>(s.g||0)>=30 && s.ppg!=null);
    if(!ss.length) return null;
    return ss.slice().sort((a,b)=>((b.ppg+0.5*(b.rpg||0)+0.7*(b.apg||0))-(a.ppg+0.5*(a.rpg||0)+0.7*(a.apg||0))))[0];
  }
  const chip=(k,v)=>'<div class="spot-clue"><span class="sc-k">'+k+'</span><span class="sc-v">'+v+'</span></div>';

  function paint(){
    if(!SPOT.length){ host.innerHTML='<div class="game-empty"><div class="big">No players loaded</div><p>Drop <b>nba-players.js</b> beside this page and reload.</p></div>'; return; }
    const p=cur;
    const hero='<div class="home-hero"><div class="home-logo" role="img" aria-label="The Record Book"></div><h1 class="home-title">The Record Book</h1><p class="home-sub">Every NBA career, by the numbers — 1946 to today.</p><div class="home-searchwrap" id="homeSearch"></div><div class="home-searchhint">Find any player to open their full career &amp; season log.</div></div>';

    const av = revealed ? avatarHTML(p,'spot-av') : '<div class="spot-av spot-q"><div class="mono">?</div></div>';
    const seasons=(p.sea||[]).length;
    const clues=[];
    clues.push(chip('Position', p.posF||p.pos||'—'));
    clues.push(chip('Era', eraName(p.e)||'—'));
    clues.push(chip('Seasons', seasons));
    if(p.dft && p.dft.pk) clues.push(chip('Draft', ordinal(p.dft.pk)+(p.dft.yr?' · '+p.dft.yr:'')));
    else if(p.dft===null) clues.push(chip('Draft','Undrafted'));
    clues.push(chip('Teams', p.tm||'—'));

    const cell=(v,k)=>{ const na=(v==null); return '<div class="cell"><div class="cv'+(na?' na':'')+'">'+(na?'—':v)+'</div><div class="ck">'+k+'</div></div>'; };
    const career='<div class="spot-block"><div class="spot-blabel">Career averages</div><div class="statgrid">'+
      cell(p.g!=null?p.g.toLocaleString():null,'G')+cell(p.ppg!=null?p.ppg.toFixed(1):null,'PPG')+cell(fmt(p.rpg),'RPG')+cell(fmt(p.apg),'APG')+cell(pct(p.fg),'FG%')+cell(pct(p.tp),'3P%')+cell(pct(p.ts),'TS%')+'</div></div>';

    const bs=bestSeason(p);
    const bestBlock = bs ? '<div class="spot-block"><div class="spot-blabel">Best season</div><div class="spot-best">'+seasonLabel(bs.y)+' · '+teamName(bs.tm)+' — <b>'+bs.ppg.toFixed(1)+'</b> pts · '+(bs.rpg!=null?bs.rpg.toFixed(1):'—')+' reb · '+(bs.apg!=null?bs.apg.toFixed(1):'—')+' ast</div></div>' : '';

    const aw=awardsHTML(p);
    const awBlock='<div class="spot-block"><div class="spot-blabel">Honors</div>'+(aw?'<div class="ph-badges">'+aw+'</div>':'<div class="spot-none">No major awards on record</div>')+'</div>';

    let simBlock='';
    if(revealed){
      const sim=similarPlayers(p,4);
      simBlock='<div class="spot-block"><div class="spot-blabel">Statistically similar</div><div class="spot-sim">'+sim.map(s=>'<button class="spot-simb" data-sim="'+encodeURIComponent(s.n)+'">'+avatarHTML(s,'spot-simav')+'<span class="spot-simn">'+s.n+'</span><span class="spot-simy">'+(s.yrs||'')+'</span></button>').join('')+'</div></div>';
    }

    const name = revealed ? p.n : '???';
    const nmeta = revealed ? ((p.yrs||'')+(p.hof?' · Hall of Fame':'')) : 'Guess from the clues below';
    const actions = revealed
      ? '<button class="gbtn primary" id="spotCareer">Open full career →</button><button class="gbtn ghost" id="spotNew">↻ Feature another</button>'
      : '<button class="gbtn primary" id="spotReveal">Reveal who it is</button><button class="gbtn ghost" id="spotNew">↻ Skip — new player</button>';

    const spotHTML='<div class="home-spot"><div class="spot-card"><div class="spot-top"><div class="eyebrow">Featured this visit'+(revealed?'':' · Guess who')+'</div></div><div class="spot-grid"><div class="spot-figcol"><div class="spot-figwrap">'+av+'</div><div class="spot-figname">'+name+'</div><div class="spot-figmeta">'+nmeta+'</div></div><div class="spot-info"><div class="spot-clues">'+clues.join('')+'</div>'+career+bestBlock+awBlock+simBlock+'<div class="spot-actions">'+actions+'</div></div></div></div></div>';

    host.innerHTML=hero+spotHTML;

    const sref=makeSearch(); const sb=host.querySelector('#homeSearch'); if(sb) sb.appendChild(sref.wrap);
    const rv=host.querySelector('#spotReveal'); if(rv) rv.addEventListener('click', ()=>{ revealed=true; paint(); });
    const nw=host.querySelector('#spotNew'); if(nw) nw.addEventListener('click', ()=>{ cur=rnd(SPOT); revealed=false; paint(); host.scrollIntoView({behavior:'smooth',block:'start'}); });
    const oc=host.querySelector('#spotCareer'); if(oc) oc.addEventListener('click', ()=>Rosters.openCareer(p));
    const sw=host.querySelector('.spot-sim'); if(sw) sw.addEventListener('click', e=>{ const b=e.target.closest('[data-sim]'); if(!b) return; const nm=decodeURIComponent(b.dataset.sim); const sp=DATA.find(x=>x.n===nm); if(sp) Rosters.openCareer(sp); });
  }

  function init(){ cur=rnd(SPOT); revealed=false; paint(); }
  return { init };
})();

/* ===================== GAMES ===================== */
const Game = (function(){
  const stage=document.getElementById('gameStage');
  const elT=document.getElementById('gTitle'), elTag=document.getElementById('gTag');
  const sbV1=document.getElementById('sbV1'), sbK1=document.getElementById('sbK1');
  const sbV2=document.getElementById('sbV2'), sbK2=document.getElementById('sbK2');
  const modesMenu=document.getElementById('modesMenu');
  const gameArea=document.getElementById('gameArea');
  const backBtn=document.getElementById('gameBack');

  const rnd = a => a[Math.floor(Math.random()*a.length)];
  const shuffle = a => { a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; };
  const el = h => { const t=document.createElement('template'); t.innerHTML=(h||'').trim(); return t.content.firstElementChild; };
  const nameIndex = DATA.map(p=>({n:p.n,k:norm(p.n),yrs:p.yrs}));
  const byName = new Map(DATA.map(p=>[norm(p.n),p]));
  const withSeasons = DATA.filter(p=>p.sea && p.sea.length>=2);
  const notable = p => (p.g>=400)||(p.ppg>=14)||(p.allstar>0)||(p.mvp>0)||p.hof;
  const eraName = e => e ? e.charAt(0).toUpperCase()+e.slice(1)+' era' : '';
  const posName = p => p==='G'?'Guard':p==='F'?'Forward':p==='C'?'Center':(p||'');

  function bestGet(key){ try{ return parseInt(localStorage.getItem('rb_'+key)||'0',10)||0; }catch(_){ return 0; } }
  function bestSet(key,v){ try{ localStorage.setItem('rb_'+key, String(v)); }catch(_){} }
  function score(v1,k1,v2,k2){ sbV1.textContent=v1; sbK1.textContent=k1; sbV2.textContent=v2; sbK2.textContent=k2; }
  function pulse(e){ if(!e) return; e.classList.remove('pop'); void e.offsetWidth; e.classList.add('pop'); }
  const pop1=()=>pulse(sbV1.parentElement), pop2=()=>pulse(sbV2.parentElement);
  const needSeasons='<div class="game-empty"><div class="big">No season logs loaded</div><p>This game reads season-by-season careers from the generated database. Drop <b>nba-players.js</b> beside this page and reload.</p></div>';
  const tooFew = m => '<div class="game-empty"><div class="big">Not enough players</div><p>'+(m||'Load the full database to play this one.')+'</p></div>';

  function makeNameInput(opts){
    const wrap=document.createElement('div'); wrap.className='ac-wrap';
    const input=document.createElement('input'); input.type='text'; input.autocomplete='off'; input.placeholder=opts.placeholder||'Name the player…';
    const ac=document.createElement('div'); ac.className='ac-list';
    wrap.appendChild(input); wrap.appendChild(ac);
    let items=[], sel=-1;
    const close=()=>{ ac.classList.remove('show'); items=[]; sel=-1; };
    const open=q=>{ const k=norm(q); if(k.length<2){close();return;} items=nameIndex.filter(x=>x.k.includes(k)).slice(0,8); if(!items.length){close();return;} sel=-1; ac.innerHTML=items.map((x,i)=>'<div class="ac-item" data-i="'+i+'"><span>'+x.n+'</span><span class="ai-meta">'+(x.yrs||'')+'</span></div>').join(''); ac.classList.add('show'); };
    const paint=()=>{ [...ac.children].forEach((c,i)=>c.classList.toggle('sel',i===sel)); };
    const resolve=t=>{ const k=norm(t); let m=nameIndex.find(x=>x.k===k); if(!m){ const c=nameIndex.filter(x=>x.k.includes(k)); if(c.length===1) m=c[0]; } return m; };
    const commit=t=>{ const raw=(t||'').trim(); if(!raw){ opts.onSubmit(null,''); return; } const m=resolve(raw); opts.onSubmit(m?m.n:null, raw); if(opts.clearOnSubmit) input.value=''; close(); };
    input.addEventListener('input', ()=>open(input.value));
    input.addEventListener('keydown', e=>{ if(e.key==='ArrowDown'){e.preventDefault(); if(items.length){sel=(sel+1)%items.length;paint();}} else if(e.key==='ArrowUp'){e.preventDefault(); if(items.length){sel=(sel-1+items.length)%items.length;paint();}} else if(e.key==='Enter'){e.preventDefault(); commit(sel>=0&&items[sel]?items[sel].n:input.value);} else if(e.key==='Escape'){close();} });
    input.addEventListener('blur', ()=>setTimeout(close,160));
    ac.addEventListener('mousedown', e=>{ const it=e.target.closest('.ac-item'); if(!it) return; e.preventDefault(); commit(items[+it.dataset.i].n); });
    return { wrap, focus:()=>input.focus(), submit:()=>commit(input.value) };
  }
  function makeSearchInput(index, placeholder, onSubmit){
    const wrap=document.createElement('div'); wrap.className='ac-wrap';
    const input=document.createElement('input'); input.type='text'; input.autocomplete='off'; input.placeholder=placeholder;
    const ac=document.createElement('div'); ac.className='ac-list';
    wrap.appendChild(input); wrap.appendChild(ac);
    let items=[], sel=-1;
    const close=()=>{ ac.classList.remove('show'); items=[]; sel=-1; };
    const open=q=>{ const k=norm(q); if(k.length<2){close();return;} items=index.filter(x=>x.k.includes(k)).slice(0,8); if(!items.length){close();return;} sel=-1; ac.innerHTML=items.map((x,i)=>'<div class="ac-item" data-i="'+i+'"><span>'+x.t+'</span></div>').join(''); ac.classList.add('show'); };
    const paint=()=>{ [...ac.children].forEach((c,i)=>c.classList.toggle('sel',i===sel)); };
    const resolve=t=>{ const k=norm(t); let m=index.find(x=>x.k===k); if(!m){ const c=index.filter(x=>x.k.includes(k)); if(c.length===1) m=c[0]; } return m; };
    const commit=t=>{ const raw=(t||'').trim(); const m=resolve(raw); onSubmit(m?m.t:null, raw); close(); };
    input.addEventListener('input', ()=>open(input.value));
    input.addEventListener('keydown', e=>{ if(e.key==='ArrowDown'){e.preventDefault(); if(items.length){sel=(sel+1)%items.length;paint();}} else if(e.key==='ArrowUp'){e.preventDefault(); if(items.length){sel=(sel-1+items.length)%items.length;paint();}} else if(e.key==='Enter'){e.preventDefault(); commit(sel>=0&&items[sel]?items[sel].t:input.value);} else if(e.key==='Escape'){close();} });
    input.addEventListener('blur', ()=>setTimeout(close,160));
    ac.addEventListener('mousedown', e=>{ const it=e.target.closest('.ac-item'); if(!it) return; e.preventDefault(); commit(items[+it.dataset.i].t); });
    return { wrap, focus:()=>input.focus(), submit:()=>commit(input.value) };
  }

  const GAMES = {};

  /* ---- 1) Off the Record ---- */
  GAMES.otr = (function(){
    let cur=null, answered=false, streak=0, pool='notable', blind=false, ni=null;
    function pools(){ let l=withSeasons; if(pool==='notable'){ const f=l.filter(notable); if(f.length) l=f; } return l; }
    function seasonTable(p,b){
      const head=['Season','Age','Team','G','MPG','PPG','RPG','APG','SPG','BPG','FG%','3P%','FT%','TS%'];
      const sc=v=>{ const na=(v==null); return '<td class="'+(na?'na':'')+'">'+(na?'—':v)+'</td>'; };
      const rows=p.sea.map((s,idx)=>{ const yr=b?('Yr '+(idx+1)):seasonLabel(s.y); const tm=b?'—':(s.tm||'—'); const ag=b?'—':(s.ag!=null?s.ag:'—');
        return '<tr><td class="yr">'+yr+'</td><td>'+ag+'</td><td class="tmc'+(b?' blind':'')+'">'+tm+'</td>'+sc(s.g)+sc(fmt(s.mpg))+sc(fmt(s.ppg))+sc(fmt(s.rpg))+sc(fmt(s.apg))+sc(fmt(s.spg))+sc(fmt(s.bpg))+sc(pct(s.fg))+sc(pct(s.tp))+sc(pct(s.ft))+sc(pct(s.ts))+'</tr>'; }).join('');
      return '<div class="seasonwrap"><table class="seasons"><thead><tr>'+head.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows+'</tbody></table></div>';
    }
    const posPill=p=>{ const v=p.pos?posName(p.pos):'—'; return '<span class="pp-k">Pos</span><span class="pp-v'+(p.pos?'':' na')+'">'+v+'</span>'; };
    const clue=p=>{ const b=[eraName(p.e), p.sea.length+' seasons']; if(p.g) b.push(p.g.toLocaleString()+' career G'); return b.filter(Boolean).join('  ·  '); };
    function scaffold(){
      stage.innerHTML='<div class="game-controls"><div class="seg" id="otrPool"><button class="seg-b'+(pool==='notable'?' on':'')+'" data-pool="notable">Starters</button><button class="seg-b'+(pool==='all'?' on':'')+'" data-pool="all">Everyone</button></div><label class="blindtog"><input type="checkbox" id="otrBlind"'+(blind?' checked':'')+'> Blind mode <span>— hide teams &amp; years</span></label></div><div id="otrRound"></div>';
      stage.querySelector('#otrPool').addEventListener('click', e=>{ const b=e.target.closest('.seg-b'); if(!b) return; stage.querySelectorAll('#otrPool .seg-b').forEach(x=>x.classList.remove('on')); b.classList.add('on'); pool=b.dataset.pool; round(); });
      stage.querySelector('#otrBlind').addEventListener('change', e=>{ blind=e.target.checked; if(!answered) round(); });
    }
    function round(){
      const l=pools(); const host=stage.querySelector('#otrRound'); if(!host) return;
      if(!l.length){ host.innerHTML=''; return; }
      cur=rnd(l); answered=false;
      host.innerHTML='<div class="mystery"><div class="mystery-top"><div class="redact-bar"></div><div class="pos-pill">'+posPill(cur)+'</div><div class="mystery-clue">'+clue(cur)+'</div></div>'+seasonTable(cur,blind)+'</div><div class="verdict" id="otrV">Read the career line and name the player.</div><div class="guessbar" id="otrBar"></div>';
      const bar=host.querySelector('#otrBar');
      ni=makeNameInput({placeholder:'Name the player…', onSubmit:(name,raw)=>guess(name,raw)});
      bar.appendChild(ni.wrap);
      const sb=el('<button class="gbtn primary">Guess</button>'); sb.onclick=()=>ni.submit();
      const rv=el('<button class="gbtn ghost">Reveal</button>'); rv.onclick=()=>finish(false,null);
      bar.appendChild(sb); bar.appendChild(rv); ni.focus();
    }
    function guess(name, raw){
      if(answered) return;
      if(!name){ const v=stage.querySelector('#otrV'); v.textContent = raw ? 'No player by that name on record — check the spelling.' : 'Type a name or pick one from the list.'; v.className='verdict bad'; return; }
      finish(norm(name)===norm(cur.n), name);
    }
    function finish(correct, name){
      if(answered) return; answered=true;
      const v=stage.querySelector('#otrV');
      if(correct){ streak++; if(streak>bestGet('otr')){ bestSet('otr',streak); pop2(); } score(streak,'Streak',bestGet('otr'),'Best'); pop1(); v.textContent='✓ Correct — it\u2019s '+cur.n+'.'; v.className='verdict good'; }
      else { streak=0; score(0,'Streak',bestGet('otr'),'Best'); v.textContent = name ? ('✗ That\u2019s '+name+' — not our man. Streak reset.') : '✗ Answer revealed. Streak reset.'; v.className='verdict bad'; }
      const acc=[]; if(cur.mvp>0)acc.push(cur.mvp+'× MVP'); if(cur.allnba>0)acc.push(cur.allnba+'× All-NBA'); else if(cur.allstar>0)acc.push(cur.allstar+'× All-Star'); if(cur.hof)acc.push('Hall of Fame');
      const meta=(cur.yrs||'')+' · '+(cur.tm||'')+(acc.length?'  ·  '+acc.join(' · '):'');
      const panel=el('<div class="reveal'+(correct?'':' bad')+'"><div><div class="rv-name">'+cur.n+'</div><div class="rv-meta">'+meta+'</div></div></div>');
      v.insertAdjacentElement('afterend', panel);
      const bar=stage.querySelector('#otrBar'); bar.innerHTML='<button class="gbtn primary">Next player →</button>';
      bar.querySelector('button').onclick=round; bar.querySelector('button').focus();
      if(blind){ const w=stage.querySelector('.mystery .seasonwrap'); if(w){ w.replaceWith(el(seasonTable(cur,false))); } }
    }
    function start(){ score(streak,'Streak',bestGet('otr'),'Best'); if(!withSeasons.length){ stage.innerHTML=needSeasons; return; } scaffold(); round(); }
    return { name:'Off the Record', tag:'The name\u2019s struck from the page — read the career line and call the player.', start, stop(){} };
  })();

  /* ---- 2) Higher or Lower ---- */
  GAMES.hilo = (function(){
    let streak=0, a=null, b=null, cat=null, answered=false;
    const CATS=[
      {k:'ppg', lab:'points per game', val:p=>p.ppg, f:v=>v.toFixed(1)},
      {k:'rpg', lab:'rebounds per game', val:p=>p.rpg, f:v=>v.toFixed(1)},
      {k:'apg', lab:'assists per game', val:p=>p.apg, f:v=>v.toFixed(1)},
      {k:'g',   lab:'games played', val:p=>p.g, f:v=>v.toLocaleString()},
      {k:'ts',  lab:'true shooting %', val:p=>p.ts, f:v=>v.toFixed(3).replace(/^0/,'')},
      {k:'allstar', lab:'All-Star selections', val:p=>p.allstar, f:v=>String(v)},
      {k:'allnba', lab:'All-NBA selections', val:p=>p.allnba, f:v=>String(v)},
      {k:'mvp', lab:'MVP awards', val:p=>p.mvp, f:v=>String(v)},
      {k:'poper', lab:'career playoff PER', val:p=>p.po?p.po.per:null, f:v=>v.toFixed(1)},
    ];
    const POOL = DATA.filter(notable);
    function pickPair(){
      for(let t=0;t<40;t++){
        cat=rnd(CATS);
        const cand=POOL.filter(p=>cat.val(p)!=null);
        if(cand.length<2) continue;
        const x=rnd(cand); let y=rnd(cand), g=0;
        while((y===x || cat.val(y)===cat.val(x)) && g++<30) y=rnd(cand);
        if(y!==x && cat.val(y)!==cat.val(x)){ a=x; b=y; return true; }
      }
      return false;
    }
    function card(p, side){
      return '<button class="hl-card" data-side="'+side+'"><div class="hl-name">'+p.n+'</div><div class="hl-meta">'+(p.pos?posName(p.pos)+' · ':'')+(p.yrs||'')+'</div><div class="hl-meta dim">'+(p.tm||'')+'</div><div class="hl-val" data-v>—</div></button>';
    }
    function round(){
      if(!pickPair()){ stage.innerHTML=tooFew(); return; }
      answered=false;
      stage.innerHTML='<div class="hl-q">Who has more <b>'+cat.lab+'</b>?</div><div class="hl-grid">'+card(a,'a')+'<div class="hl-vs">vs</div>'+card(b,'b')+'</div><div class="verdict" id="hlV">Tap the player you think ranks higher.</div><div class="guessbar" id="hlBar"></div>';
      stage.querySelectorAll('.hl-card').forEach(c=>c.addEventListener('click', ()=>choose(c.dataset.side)));
    }
    function choose(side){
      if(answered) return; answered=true;
      const av=cat.val(a), bv=cat.val(b);
      const correct=(side==='a'&&av>=bv)||(side==='b'&&bv>=av);
      stage.querySelectorAll('.hl-card').forEach(c=>{ const p=c.dataset.side==='a'?a:b; c.querySelector('[data-v]').textContent=cat.f(cat.val(p)); c.classList.add('done'); });
      stage.querySelector('.hl-card[data-side="'+(av>=bv?'a':'b')+'"]').classList.add('win');
      const v=stage.querySelector('#hlV');
      if(correct){ streak++; if(streak>bestGet('hilo')){ bestSet('hilo',streak); pop2(); } score(streak,'Streak',bestGet('hilo'),'Best'); pop1(); v.textContent='✓ Right.'; v.className='verdict good'; }
      else { streak=0; score(0,'Streak',bestGet('hilo'),'Best'); v.textContent='✗ Other way around.'; v.className='verdict bad'; }
      const bar=stage.querySelector('#hlBar'); bar.innerHTML='<button class="gbtn primary">Next →</button>';
      bar.querySelector('button').onclick=round; bar.querySelector('button').focus();
    }
    function start(){ score(streak,'Streak',bestGet('hilo'),'Best'); if(POOL.length<2){ stage.innerHTML=tooFew(); return; } round(); }
    return { name:'Higher or Lower', tag:'Two players, one stat. Pick who ranks higher and run the streak.', start, stop(){} };
  })();

  /* ---- 3) Guess the Season ---- */
  GAMES.season = (function(){
    let streak=0, cur=null, sea=null, answered=false;
    const POOL = withSeasons.filter(p=>notable(p) && p.sea.length>=3);
    function options(p, yr){
      const opts=new Set([yr]);
      shuffle(p.sea.map(s=>s.y).filter(y=>y!==yr)).slice(0,4).forEach(y=>opts.add(y));
      let off=1;
      while(opts.size<5 && off<18){ for(const d of [off,-off]){ const ys=yr+d; if(ys>=1947 && ys<=2026 && !opts.has(ys)){ opts.add(ys); if(opts.size>=5) break; } } off++; }
      return shuffle([...opts]).slice(0,5);
    }
    function statRow(s){
      const head=['G','MPG','PPG','RPG','APG','SPG','BPG','FG%','3P%','FT%','TS%'];
      const sc=v=>{const na=(v==null);return '<td class="'+(na?'na':'')+'">'+(na?'—':v)+'</td>';};
      return '<div class="seasonwrap"><table class="seasons"><thead><tr>'+head.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody><tr>'+sc(s.g)+sc(fmt(s.mpg))+sc(fmt(s.ppg))+sc(fmt(s.rpg))+sc(fmt(s.apg))+sc(fmt(s.spg))+sc(fmt(s.bpg))+sc(pct(s.fg))+sc(pct(s.tp))+sc(pct(s.ft))+sc(pct(s.ts))+'</tr></tbody></table></div>';
    }
    function round(){
      cur=rnd(POOL); sea=rnd(cur.sea); answered=false;
      const opts=options(cur, sea.y);
      stage.innerHTML='<div class="mystery"><div class="mystery-top"><div class="pos-pill"><span class="pp-k">Player</span><span class="pp-v">'+cur.n+'</span></div><div class="mystery-clue">'+(sea.tm&&sea.tm!=='—'?sea.tm+'  ·  ':'')+'one line from a '+cur.sea.length+'-season career</div></div>'+statRow(sea)+'</div><div class="verdict" id="seV">Which season produced this line?</div><div class="opt-grid" id="seOpts">'+opts.map(o=>'<button class="opt-b" data-o="'+o+'">'+seasonLabel(o)+'</button>').join('')+'</div>';
      stage.querySelector('#seOpts').addEventListener('click', e=>{ const b=e.target.closest('.opt-b'); if(!b) return; choose(+b.dataset.o, b); });
    }
    function choose(pick, btn){
      if(answered) return; answered=true;
      const correct = pick===sea.y;
      stage.querySelectorAll('.opt-b').forEach(b=>{ b.disabled=true; if(+b.dataset.o===sea.y) b.classList.add('right'); });
      if(!correct) btn.classList.add('wrong');
      const v=stage.querySelector('#seV');
      if(correct){ streak++; if(streak>bestGet('season')){ bestSet('season',streak); pop2(); } score(streak,'Streak',bestGet('season'),'Best'); pop1(); v.textContent='✓ '+seasonLabel(sea.y)+' — right.'; v.className='verdict good'; }
      else { streak=0; score(0,'Streak',bestGet('season'),'Best'); v.textContent='✗ It was '+seasonLabel(sea.y)+'.'; v.className='verdict bad'; }
      const nx=el('<div class="guessbar"><button class="gbtn primary">Next →</button></div>');
      nx.querySelector('button').onclick=round; stage.appendChild(nx); nx.querySelector('button').focus();
    }
    function start(){ score(streak,'Streak',bestGet('season'),'Best'); if(!POOL.length){ stage.innerHTML=needSeasons; return; } round(); }
    return { name:'Guess the Season', tag:'A single season\u2019s line from a known player. Pin down which year it was.', start, stop(){} };
  })();

  /* ---- 4) Top of the Charts ---- */
  GAMES.charts = (function(){
    let cat=null, top=[], found=new Set(), timer=null, timeLeft=60, running=false;
    const CATS=[
      {k:'g',  tab:'Games', lab:'Most games played', val:x=>x.g, elig:x=>true, f:v=>v.toLocaleString()},
      {k:'ppg',tab:'PPG', lab:'Highest career points per game', val:x=>x.ppg, elig:x=>x.g>=400, f:v=>v.toFixed(1)},
      {k:'rpg',tab:'RPG', lab:'Highest career rebounds per game', val:x=>x.rpg, elig:x=>x.g>=400, f:v=>v.toFixed(1)},
      {k:'apg',tab:'APG', lab:'Highest career assists per game', val:x=>x.apg, elig:x=>x.g>=400, f:v=>v.toFixed(1)},
      {k:'ts', tab:'TS%', lab:'Best career true shooting (min. 400 G)', val:x=>x.ts, elig:x=>x.g>=400, f:v=>v.toFixed(3).replace(/^0/,'')},
      {k:'poper',tab:'PO PER', lab:'Highest career playoff PER (min. 25 PO G)', val:x=>x.po?x.po.per:null, elig:x=>x.po&&x.po.g>=25, f:v=>v.toFixed(1)},
    ];
    function buildTop(){ const p=DATA.filter(x=>cat.val(x)!=null && cat.elig(x)); top=p.slice().sort((x,y)=>cat.val(y)-cat.val(x)).slice(0,10); }
    function render(){
      stage.innerHTML='<div class="game-controls"><div class="seg" id="tocCat">'+CATS.map(c=>'<button class="seg-b'+(c.k===cat.k?' on':'')+'" data-k="'+c.k+'">'+c.tab+'</button>').join('')+'</div><div class="toc-timer" id="tocTimer">'+timeLeft+'s</div></div><div class="toc-head"><div class="toc-cat">'+cat.lab+'</div><div class="guessbar" id="tocBar"></div></div><div class="toc-board" id="tocBoard">'+top.map((p,i)=>'<div class="toc-row" data-i="'+i+'"><span class="toc-rank">'+(i+1)+'</span><span class="toc-name">—</span><span class="toc-stat"></span></div>').join('')+'</div>';
      stage.querySelector('#tocCat').addEventListener('click', e=>{ const b=e.target.closest('.seg-b'); if(!b||b.dataset.k===cat.k) return; stop(); cat=CATS.find(c=>c.k===b.dataset.k); reset(); });
      renderBar();
    }
    function renderBar(){
      const bar=stage.querySelector('#tocBar'); if(!bar) return; bar.innerHTML='';
      if(running){ const ni=makeNameInput({placeholder:'Name a player…', clearOnSubmit:true, onSubmit:(name)=>tryName(name)}); bar.appendChild(ni.wrap); ni.focus(); }
      else if(found.size>=10 || timeLeft<=0){ const b=el('<button class="gbtn primary">New round →</button>'); b.onclick=()=>{ cat=rnd(CATS); reset(); }; bar.appendChild(b); }
      else { const b=el('<button class="gbtn primary">'+(found.size?'Resume clock':'Start · 60s')+'</button>'); b.onclick=startClock; bar.appendChild(b); }
    }
    function startClock(){ running=true; renderBar(); clearInterval(timer); timer=setInterval(()=>{ timeLeft--; const t=stage.querySelector('#tocTimer'); if(t) t.textContent=timeLeft+'s'; if(timeLeft<=0) endRound(false); }, 1000); }
    function tryName(name){
      if(!running||!name) return;
      const k=norm(name), idx=top.findIndex(p=>norm(p.n)===k);

    }
    function revealRow(i, hit){ const r=stage.querySelector('.toc-row[data-i="'+i+'"]'); if(!r) return; r.querySelector('.toc-name').textContent=top[i].n; r.querySelector('.toc-stat').textContent=cat.f(cat.val(top[i])); r.classList.add(hit?'hit':'miss'); }
    function endRound(){ running=false; clearInterval(timer); top.forEach((p,i)=>{ if(!found.has(i)) revealRow(i,false); }); const t=stage.querySelector('#tocTimer'); if(t) t.textContent=found.size>=10?'done':'0s'; renderBar(); }
    function reset(){ buildTop(); found=new Set(); timeLeft=60; running=false; score('0/10','Found',bestGet('charts')+'/10','Best'); render(); }
    function start(){ if(DATA.length<10){ stage.innerHTML=tooFew(); return; } if(!cat) cat=CATS[0]; reset(); }
    function stop(){ clearInterval(timer); running=false; }
    return { name:'Top of the Charts', tag:'Name the all-time top ten in a category before the 60-second clock runs out.', start, stop };
  })();

  /* ---- 5) Price Is Right ---- */
  GAMES.price = (function(){
    let streak=0, cur=null, pts=0, answered=false;
    const POOL = DATA.filter(p=>notable(p) && p.ppg!=null && p.g>=200);
    const careerPts = p => Math.round(p.ppg * p.g);
    function ctx(p){
      const cell=(v,k)=>{const na=(v==null);return '<div class="cell"><div class="cv'+(na?' na':'')+'">'+(na?'—':v)+'</div><div class="ck">'+k+'</div></div>';};
      return '<div class="statgrid">'+cell(p.g.toLocaleString(),'Games')+cell(fmt(p.rpg),'RPG')+cell(fmt(p.apg),'APG')+cell(p.pos?posName(p.pos):null,'Pos')+'</div>';
    }

      const inp=stage.querySelector('#prIn'), go=stage.querySelector('#prGo');

      else { streak=0; score(0,'Streak',bestGet('price'),'Best'); v.textContent=over?'✗ Over — bust.':'✗ Too low.'; v.className='verdict bad'; }
      const diff=g-pts, sign=diff>=0?'+':'−';
      const panel=el('<div class="reveal'+(hit?'':' bad')+'"><div><div class="rv-name">≈ '+pts.toLocaleString()+' career pts</div><div class="rv-meta">you bid '+g.toLocaleString()+'  ('+sign+Math.abs(diff).toLocaleString()+')</div></div></div>');
      v.insertAdjacentElement('afterend', panel);

    return { name:'Price Is Right', tag:'Estimate a career scoring total — closest without going over keeps the streak.', start, stop(){} };
  })();

  /* ---- 6) Chalk Talk (search the college) ---- */
